# Joint config -- this IS the kinematic tree.  Edit parent/child to
# re-wire the chain and 'type' per edge, then re-run:
#   uv run python -m sw2urdf.export <asm> --config this_file.yaml
# type: fixed | revolute | prismatic | continuous
# Sub-assemblies with moving internals expand automatically;
# override with  expand: [name-substr]  /  no_expand: [name-substr]
base: screwlock_male_hard_jointbase_v4_1
joints:
  - parent: screwlock_male_hard_jointbase_v4_1
    child:  fingertip_front_2
    type:   fixed # mates: CONCENTRIC, COINCIDENT, PARALLEL, CONCENTRIC, COINCIDENT, PARALLEL | geo: fully constrained
  - parent: fingertip_front_2
    child:  fingertip_back_1
    type:   revolute # mates: COINCIDENT, COINCIDENT, COINCIDENT, COINCIDENT | geo: 1 DOF rotation (derived axis)

# --- robot-compiler module interface (optional) ---
# root_link_name: base_link   # input port; '' keeps the part name
# ports:                       # output connectors (-> dummy_link)
#   - parent: <tip link>       # xyz/rpy in that link's frame,
#     xyz: [0, 0, 0]           # +Z = outgoing connector axis
#     rpy: [0, 0, 0]

# --- all mate-connected pairs (for reference; re-wire above) ---
#   fingertip_front_2  <->  fingertip_back_1   (COINCIDENT, COINCIDENT, COINCIDENT, COINCIDENT)
#   fingertip_front_2  <->  screwlock_male_hard_jointbase_v4_1   (CONCENTRIC, COINCIDENT, PARALLEL, CONCENTRIC, COINCIDENT, PARALLEL)
