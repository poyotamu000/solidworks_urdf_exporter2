name: CI

# Runs on every PR (and on demand), so problems are caught BEFORE a release
# tag is cut (the release workflow only runs on a vX.Y.Z tag, so without
# this the PyInstaller freeze would fail at release time with no warning).
#
# PR-only on purpose: everything lands via the bump-version PR flow, so a
# push to main is always a just-tested merge -- re-running CI on that push
# is pure duplication.  workflow_dispatch is kept for manual main runs.
#
#   lint        -- ruff (bug-focused rule set; config in pyproject.toml)
#   test        -- the pytest suite (Linux, no SolidWorks needed)
#   build-check -- freezes the web editor .exe on Windows x64 exactly like
#                  release.yml, but does NOT upload or release it; it just
#                  proves the freeze still succeeds.
#   e2e         -- builds the bundled fingertip example into a URDF package,
#                  serves it, and drives the web editor with puppeteer +
#                  headless Chrome (guards the browser UI, incl. the i18n).

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.17"   # pinned; bump deliberately

  # NOTE: this job's check is named exactly "pytest" and is a required check in
  # branch protection -- do NOT rename it or put it behind a matrix (a matrix
  # renames the checks to "pytest (ubuntu-latest)" etc., which the required
  # "pytest" gate would then wait for forever).  macOS lives in a SEPARATE job.
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # ui    -> skrobot (loads the exported URDF + resolves package:// meshes)
          # test  -> catkin_pkg (validates the exported package.xml)
          # coacd -> exercise the REAL convex-decomposition wheel (the smoke test
          #          in test_coacd_smoke.py), so a missing/broken coacd wheel
          #          fails CI instead of surfacing at runtime
          pip install ".[ui,test,coacd]"

      - name: Run tests
        run: pytest -q

  # Separate (non-required) job so the cross-platform coacd/python-fcl wheels are
  # exercised on macOS without touching the required "pytest" check name above.
  test-macos:
    name: pytest (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[ui,test,coacd]"

      - name: Run tests
        run: pytest -q

  build-check:
    name: PyInstaller freeze (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # the exe is the full-feature build, so install the same optional extras
          # it bundles ([ui] = skrobot/fcl, [coacd]); trimesh[easy] (core) already
          # pulls the pycollada/scipy/networkx mesh backends the freeze needs.
          pip install ".[ui,coacd]" pyinstaller

      - name: Freeze the web editor .exe (no release)
        run: |
          python build_exe.py --name sw2robot-web-ci
          if (!(Test-Path dist\sw2robot-web-ci.exe)) {
            Write-Error "PyInstaller did not produce the expected .exe"
            exit 1
          }

  e2e:
    name: web e2e (puppeteer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[ui]"

      - name: Build the fingertip example into a URDF package
        run: |
          python -m sw2robot.exporter.build examples/fingertip \
            --config examples/fingertip/fingertip.joints.yaml

      - name: Start the web editor server
        run: |
          nohup python -m sw2robot.editor.webserver examples/fingertip --port 8090 \
            > server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8090/api/info >/dev/null 2>&1; then
              echo "server up"; exit 0
            fi
            sleep 1
          done
          echo "server did not come up"; cat server.log; exit 1

      - name: Install e2e dependencies
        working-directory: tests/e2e
        run: npm install

      - name: Run the e2e suite
        working-directory: tests/e2e
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          # headless WebGL needs SwiftShader (three.js); the minimal bundled
          # fixture has no movable joints, so run the smoke subset.
          CHROME_ARGS: '--no-sandbox,--disable-setuid-sandbox,--enable-unsafe-swiftshader,--use-gl=angle,--use-angle=swiftshader'
          E2E_SMOKE: '1'
        run: node run.mjs http://localhost:8090

      - name: Server log (on failure)
        if: failure()
        run: cat server.log

  e2e-urdf:
    name: web e2e -- URDF-input mode (puppeteer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install sw2robot
        # no [ui]/mesh deps: the fixture is a box-geometry URDF (no meshes), so
        # the viewer renders it without the glb converter
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Start the web editor on the box URDF fixture (URDF-input mode)
        run: |
          nohup python -m sw2robot.editor.webserver tests/e2e/fixtures/boxbot \
            --port 8099 > server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8099/api/info >/dev/null 2>&1; then
              echo "server up"; exit 0
            fi
            sleep 1
          done
          echo "server did not come up"; cat server.log; exit 1

      - name: Install e2e dependencies
        working-directory: tests/e2e
        run: npm install

      - name: Run the inertial-editing e2e
        working-directory: tests/e2e
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          CHROME_ARGS: '--no-sandbox,--disable-setuid-sandbox,--enable-unsafe-swiftshader,--use-gl=angle,--use-angle=swiftshader'
        run: node verify_inertial.mjs http://localhost:8099

      - name: Server log (on failure)
        if: failure()
        run: cat server.log

  # ----- the exported ROS packages must BUILD as real catkin / colcon packages,
  # not just have the right files.  sw2robot needs Python >=3.12 but the ROS
  # images ship 3.8 (Noetic) / 3.10 (Humble), so we split: generate the
  # description packages here (3.12), then build each under its ROS toolchain.
  ros-pkg-generate:
    name: generate ROS description packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # trimesh[easy] (a core dep) pulls the .dae writer (pycollada) plus the
          # scipy/networkx mesh-processing deps the converter needs.
          pip install .

      - name: Build ROS 1 + ROS 2 <name>_description packages from the example
        run: |
          set -e
          for ver in 1 2; do
            rm -rf work && cp -r examples/fingertip work
            flag=$([ "$ver" = 2 ] && echo --ros2 || echo --ros-pkg)
            python -m sw2robot.exporter.build work \
              --config work/fingertip.joints.yaml "$flag"
            # build() writes <name>_description next to the package dir (here ./)
            mkdir -p artifacts/ros$ver
            mv fingertip_description artifacts/ros$ver/fingertip_description
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ros-desc-packages
          path: artifacts/

  ros1-build:
    name: catkin build (ROS 1 Noetic)
    needs: ros-pkg-generate
    runs-on: ubuntu-latest
    container: ros:noetic-ros-base
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ros-desc-packages
          path: artifacts

      - name: Install catkin_tools + urdf checker
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-catkin-tools liburdfdom-tools

      - name: catkin build + install + check_urdf
        shell: bash
        run: |
          set -e
          source /opt/ros/noetic/setup.bash
          mkdir -p ws/src
          cp -r artifacts/ros1/fingertip_description ws/src/
          cd ws
          catkin config --install     # run the install rules into install/
          catkin build --no-status
          source install/setup.bash
          # the URDF must parse with ROS's own urdfdom parser (the URDF defaults
          # to the package name now, so <pkg>/urdf/<pkg>.urdf)
          check_urdf install/share/fingertip_description/urdf/fingertip_description.urdf
          # the install rules must place the package's runtime files
          test -d install/share/fingertip_description/meshes

  ros2-build:
    name: colcon build (ROS 2 Humble)
    needs: ros-pkg-generate
    runs-on: ubuntu-latest
    container: ros:humble-ros-base
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ros-desc-packages
          path: artifacts

      - name: Install colcon + urdf checker
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions liburdfdom-tools

      - name: colcon build + check_urdf + launch files installed
        shell: bash
        run: |
          set -e
          source /opt/ros/humble/setup.bash
          mkdir -p ws/src
          cp -r artifacts/ros2/fingertip_description ws/src/
          cd ws
          colcon build
          source install/setup.bash
          check_urdf src/fingertip_description/urdf/fingertip_description.urdf
          share=install/fingertip_description/share/fingertip_description
          test -f "$share/urdf/fingertip_description.urdf"
          test -f "$share/launch/display.launch.py"
          test -f "$share/rviz/fingertip_description.rviz"
